# This is the sample configuration file for the Photon Messaging client.

# Configuration for the messaging service peer.
# The peerId is mandatory.
# The endpoint is optional. If omitted, the client will perform a DHT lookup to resolve
# the peer’s endpoint. If provided, these values will be used directly as the peer’s endpoint.
service:
  # Peer ID of the remote messaging service.
  #
  # This is the unique identifier of the target service node in the network.
  peerId: 3A3vvUyrzqVqzUusEsx4TzSnARSPnNYEg25faujaU1Vi

  # Endpoint used to connect to the messaging service.
  #
  # Supported schemes depend on the transport implementation.
  # Example:
  #   - MQTT: mqtt://host:port
  #
  # Ensure the endpoint is reachable from the client environment.
  endpoint: mqtts://192.168.8.80:8883


# Client identity and authentication configuration.
#
# Both user-level and device-level private keys are required to establish
# authenticated communication with the messaging service.
client:
  # Private key representing the user identity.
  #
  # This key is shared across all devices owned by the same user.
  # Keep this value secret.
  userPrivateKey: 3duCjCRTBNbA7UGqNkVAepPVcjbSGGJChHCqqZKdngyLjVfcLhj6P9XtkAJ57qbaEUHqQAD1iSM5k18EN5dgiyEG

  # Private key representing the device identity.
  #
  # Each device should have a unique key. This allows the system to
  # distinguish between multiple devices belonging to the same user.
  # Keep this value secret.
  devicePrivateKey: 5W8GUHbjECnpdSaBJ1j5XzsuxBqSetEqtKRf42qhBxegsHx1i9jiEthD7nyc3uCTuEssAzNJevJDNNiLYvyzGnGd


database:
  # Storage backend used by the messaging database.
  #
  # Supported values:
  #   - PostgreSQL: postgresql://user:password@host:port/database
  #   - SQLite:     jdbc:sqlite:/path/to/sqlite.db
  #
  # Recommendations:
  #   - SQLite: suitable for local, embedded, or low-throughput deployments
  #   - PostgreSQL: recommended for production or high-throughput environments
  uri: jdbc:sqlite:photon-messaging.db

  # Maximum number of connections in the database connection pool.
  #
  # Notes:
  #   - For SQLite, this should typically be set to 1 due to its
  #     single-writer concurrency model.
  #   - For PostgreSQL, increase this value based on workload and
  #     available resources.
  poolSize: 1

  # Database schema name (optional).
  #
  # Only applicable when using PostgreSQL.
  # If not specified, the default schema (usually "public") is used.
  schema: photon